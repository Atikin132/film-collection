<app-search [value]="search()" (valueChange)="onSearchChange($event)" />
<div class="home-page">
  @if (filteredFilms().length > 0) {
    <div class="grid">
      @for (film of filteredFilms(); track film.id) {
        <app-film-card [film]="film" />
      }
    </div>
  } @else {
    <p class="nothing-found-text">Nothing found</p>
  }
</div>
