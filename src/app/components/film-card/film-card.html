<div class="card" [routerLink]="['film/', film().id]">
  <img class="poster" [src]="film().posterUrl" [alt]="film().title" />

  <div class="info">
    <h3 class="film-title">{{ film().title }}</h3>

    <p class="meta">{{ film().year }} • {{ film().genre }}</p>

    <p class="rating">⭐ {{ film().rating }}</p>
  </div>
  <button
    class="favorite-btn"
    [class.active]="film().isFavorite"
    (click)="toggleFavorite($event)"
    aria-label="Favorite"
  ></button>
</div>
